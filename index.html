<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Game</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Chess Game</h1>
        
        <div class="game-container">
            <div id="board" class="board"></div>
            
            <div class="game-info">
                <div id="status" class="status">White to move</div>
                <div id="fen" class="fen"></div>
                <div id="pgn" class="pgn"></div>
                
                <div class="controls">
                    <button id="newGameBtn">New Game</button>
                    <button id="undoBtn">Undo Move</button>
                    <div class="difficulty">
                        <label for="difficulty">Difficulty:</label>
                        <select id="difficulty">
                            <option value="1">Easy</option>
                            <option value="2" selected>Medium</option>
                            <option value="3">Hard</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>Created by <a href="https://github.com/danghoangnam1997" target="_blank">Dang Hoang Nam</a></p>
    </footer>

    <!-- Libraries -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    
    <!-- Custom scripts -->
    <script src="js/engine.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
